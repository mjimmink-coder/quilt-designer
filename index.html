<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quilt Designer</title>
</head>
<body>
  <h1>Quilt Designer</h1>

  <div>
    <label>Blocks Across: <input type="number" id="blocksAcrossInput" value="3" min="1" max="10"></label>
    <label>Blocks Down: <input type="number" id="blocksDownInput" value="3" min="1" max="10"></label>
    <br><br>
    <label>Sashing Width: <input type="number" id="sashingWidthInput" value="10" min="0" max="40"></label>
    <label>Sashing Color: <input type="color" id="sashingColorInput" value="#ffffff"></label>
    <br><br>
    <label>Block Color A: <input type="color" id="colorAInput" value="#2b4c7e"></label>
    <label>Block Color B: <input type="color" id="colorBInput" value="#e8dcc4"></label>
  </div>

  <br>

  <svg id="quilt-canvas" style="border:1px solid #ccc;"></svg>

  <script>
    const svg = document.getElementById('quilt-canvas');

    const blocksAcrossInput = document.getElementById('blocksAcrossInput');
    const blocksDownInput = document.getElementById('blocksDownInput');
    const sashingWidthInput = document.getElementById('sashingWidthInput');
    const sashingColorInput = document.getElementById('sashingColorInput');
    const colorAInput = document.getElementById('colorAInput');
    const colorBInput = document.getElementById('colorBInput');

    const squareSize = 100;    // px per patch within a block
    const blockGrid = 3;       // each Nine Patch block is always 3x3 patches
    const blockSize = squareSize * blockGrid; // pixel size of one block

    // Draws a single Nine Patch block, offset by (offsetX, offsetY), into the given group
    function drawNinePatchBlock(group, offsetX, offsetY, colorA, colorB) {
      for (let row = 0; row < blockGrid; row++) {
        for (let col = 0; col < blockGrid; col++) {
          const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('x', offsetX + col * squareSize);
          rect.setAttribute('y', offsetY + row * squareSize);
          rect.setAttribute('width', squareSize);
          rect.setAttribute('height', squareSize);

          const isEven = (row + col) % 2 === 0;
          rect.setAttribute('fill', isEven ? colorA : colorB);

          group.appendChild(rect);
        }
      }
    }

    // Draws the full quilt: a grid of blocks with sashing between and around them
    function drawQuilt(blocksAcross, blocksDown, sashingWidth, sashingColor, colorA, colorB) {
      const totalWidth = blocksAcross * blockSize + (blocksAcross + 1) * sashingWidth;
      const totalHeight = blocksDown * blockSize + (blocksDown + 1) * sashingWidth;

      svg.setAttribute('width', totalWidth);
      svg.setAttribute('height', totalHeight);
      svg.innerHTML = '';

      // background = sashing color, fills the whole canvas first
      const background = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      background.setAttribute('x', 0);
      background.setAttribute('y', 0);
      background.setAttribute('width', totalWidth);
      background.setAttribute('height', totalHeight);
      background.setAttribute('fill', sashingColor);
      svg.appendChild(background);

      // place each block on top, leaving sashing-width gaps
      for (let by = 0; by < blocksDown; by++) {
        for (let bx = 0; bx < blocksAcross; bx++) {
          const offsetX = sashingWidth + bx * (blockSize + sashingWidth);
          const offsetY = sashingWidth + by * (blockSize + sashingWidth);
          drawNinePatchBlock(svg, offsetX, offsetY, colorA, colorB);
        }
      }
    }

    function redraw() {
      const blocksAcross = parseInt(blocksAcrossInput.value, 10);
      const blocksDown = parseInt(blocksDownInput.value, 10);
      const sashingWidth = parseInt(sashingWidthInput.value, 10);
      const sashingColor = sashingColorInput.value;
      const colorA = colorAInput.value;
      const colorB = colorBInput.value;
      drawQuilt(blocksAcross, blocksDown, sashingWidth, sashingColor, colorA, colorB);
    }

    [blocksAcrossInput, blocksDownInput, sashingWidthInput, sashingColorInput, colorAInput, colorBInput]
      .forEach(input => input.addEventListener('input', redraw));

    redraw();
  </script>
</body>
</html>
