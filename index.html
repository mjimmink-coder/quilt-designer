<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quilt Designer</title>
</head>
<body>
  <h1>Quilt Designer</h1>

  <div>
    <label>Rows: <input type="number" id="rowsInput" value="3" min="1" max="12"></label>
    <label>Columns: <input type="number" id="colsInput" value="3" min="1" max="12"></label>
    <label>Color A: <input type="color" id="colorAInput" value="#2b4c7e"></label>
    <label>Color B: <input type="color" id="colorBInput" value="#e8dcc4"></label>
  </div>

  <br>

  <svg id="quilt-canvas" style="border:1px solid #ccc;"></svg>

  <script>
    const svg = document.getElementById('quilt-canvas');
    const rowsInput = document.getElementById('rowsInput');
    const colsInput = document.getElementById('colsInput');
    const colorAInput = document.getElementById('colorAInput');
    const colorBInput = document.getElementById('colorBInput');

    const squareSize = 100; // px per patch, fixed for now

    function drawNinePatch(rows, cols, squareSize, colorA, colorB) {
      svg.setAttribute('width', cols * squareSize);
      svg.setAttribute('height', rows * squareSize);
      svg.innerHTML = '';

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('x', col * squareSize);
          rect.setAttribute('y', row * squareSize);
          rect.setAttribute('width', squareSize);
          rect.setAttribute('height', squareSize);

          const isEven = (row + col) % 2 === 0;
          rect.setAttribute('fill', isEven ? colorA : colorB);

          svg.appendChild(rect);
        }
      }
    }

    function redraw() {
      const rows = parseInt(rowsInput.value, 10);
      const cols = parseInt(colsInput.value, 10);
      const colorA = colorAInput.value;
      const colorB = colorBInput.value;
      drawNinePatch(rows, cols, squareSize, colorA, colorB);
    }

    // redraw whenever any control changes
    rowsInput.addEventListener('input', redraw);
    colsInput.addEventListener('input', redraw);
    colorAInput.addEventListener('input', redraw);
    colorBInput.addEventListener('input', redraw);

    // initial draw on page load
    redraw();
  </script>
</body>
</html>
