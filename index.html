<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quilt Designer</title>
  <style>
    .palette-swatch {
      display: inline-block;
      width: 50px;
      height: 30px;
      margin-right: 6px;
      border: 2px solid #888;
      cursor: pointer;
      vertical-align: middle;
    }
    .palette-swatch:hover {
      border-color: #000;
    }
    #yardageResults {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border: 1px solid #ccc;
      max-width: 350px;
    }
    #yardageResults div {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <h1>Quilt Designer</h1>

  <div>
    <label>Block Pattern:
      <select id="patternSelect">
        <option value="ninepatch">Nine Patch</option>
        <option value="logcabin">Log Cabin</option>
      </select>
    </label>
    <label style="margin-left:20px;">Block Size (inches): <input type="number" id="blockSizeInchesInput" value="12" min="4" max="24"></label>
    <br><br>
    <label>Blocks Across: <input type="number" id="blocksAcrossInput" value="3" min="1" max="10"></label>
    <label>Blocks Down: <input type="number" id="blocksDownInput" value="3" min="1" max="10"></label>
    <br><br>
    <label>Sashing Width: <input type="number" id="sashingWidthInput" value="10" min="0" max="40"></label>
    <label>Sashing Color: <input type="color" id="sashingColorInput" value="#ffffff"></label>
    <br><br>
    <label>Border Width: <input type="number" id="borderWidthInput" value="20" min="0" max="60"></label>
    <label>Border Color: <input type="color" id="borderColorInput" value="#2b4c7e"></label>
    <br><br>

    <div>
      <strong>Color Presets:</strong><br>
      <div id="presetContainer"></div>
    </div>
    <br>

    <label>Block Color A: <input type="color" id="colorAInput" value="#2b4c7e"></label>
    <label>Block Color B: <input type="color" id="colorBInput" value="#e8dcc4"></label>
  </div>

  <br>

  <svg id="quilt-canvas" style="border:1px solid #ccc;"></svg>

  <br><br>
  <button id="downloadBtn">Download Design as PNG</button>

  <div id="yardageResults"></div>

  <script>
    const svg = document.getElementById('quilt-canvas');
    const yardageResults = document.getElementById('yardageResults');
    const downloadBtn = document.getElementById('downloadBtn');

    const patternSelect = document.getElementById('patternSelect');
    const blockSizeInchesInput = document.getElementById('blockSizeInchesInput');
    const blocksAcrossInput = document.getElementById('blocksAcrossInput');
    const blocksDownInput = document.getElementById('blocksDownInput');
    const sashingWidthInput = document.getElementById('sashingWidthInput');
    const sashingColorInput = document.getElementById('sashingColorInput');
    const borderWidthInput = document.getElementById('borderWidthInput');
    const borderColorInput = document.getElementById('borderColorInput');
    const colorAInput = document.getElementById('colorAInput');
    const colorBInput = document.getElementById('colorBInput');
    const presetContainer = document.getElementById('presetContainer');

    const squareSize = 100;
    const blockGrid = 3;
    const blockSize = squareSize * blockGrid; // 300px — represents whatever "Block Size (inches)" is set to

    // Standard quilting fabric: ~42" usable width per yard (after selvage trim), 36" per yard length
    const FABRIC_USABLE_WIDTH_IN = 42;
    const SQ_IN_PER_YARD = FABRIC_USABLE_WIDTH_IN * 36;

    // Accumulates area (in px^2) drawn for each role, reset at the start of every redraw
    let areaTotals = { colorA: 0, colorB: 0, sashing: 0, border: 0 };

    const palettes = [
      { name: 'Classic Navy', colorA: '#2b4c7e', colorB: '#e8dcc4' },
      { name: 'Amish Solids', colorA: '#8b1a1a', colorB: '#1a1a1a' },
      { name: 'Soft Pastel', colorA: '#f4c2c2', colorB: '#c2e0f4' },
      { name: 'Autumn', colorA: '#a5502e', colorB: '#e0a458' },
      { name: 'Forest', colorA: '#2d4a2b', colorB: '#d9c9a3' },
      { name: 'Modern Mono', colorA: '#333333', colorB: '#f2f2f2' }
    ];

    palettes.forEach(p => {
      const swatch = document.createElement('div');
      swatch.className = 'palette-swatch';
      swatch.title = p.name;
      swatch.style.background = `linear-gradient(to right, ${p.colorA} 50%, ${p.colorB} 50%)`;
      swatch.addEventListener('click', () => {
        colorAInput.value = p.colorA;
        colorBInput.value = p.colorB;
        redraw();
      });
      presetContainer.appendChild(swatch);
    });

    // role = 'colorA' | 'colorB' | 'sashing' | 'border' | null — used to track fabric area, not just draw
    function addRect(group, x, y, w, h, fill, role) {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x);
      rect.setAttribute('y', y);
      rect.setAttribute('width', w);
      rect.setAttribute('height', h);
      rect.setAttribute('fill', fill);
      group.appendChild(rect);

      if (role) {
        areaTotals[role] += w * h;
      }
    }

    function drawNinePatchBlock(group, offsetX, offsetY, colorA, colorB) {
      for (let row = 0; row < blockGrid; row++) {
        for (let col = 0; col < blockGrid; col++) {
          const isEven = (row + col) % 2 === 0;
          addRect(group, offsetX + col * squareSize, offsetY + row * squareSize, squareSize, squareSize, isEven ? colorA : colorB, isEven ? 'colorA' : 'colorB');
        }
      }
    }

    function drawLogCabinBlock(group, offsetX, offsetY, colorA, colorB) {
      const rounds = 4;
      const stripWidth = 25;
      const centerSize = blockSize - 2 * rounds * stripWidth;

      let x = (blockSize - centerSize) / 2;
      let y = (blockSize - centerSize) / 2;
      let w = centerSize;
      let h = centerSize;

      addRect(group, offsetX + x, offsetY + y, w, h, colorB, 'colorB');

      for (let r = 0; r < rounds; r++) {
        addRect(group, offsetX + x + w, offsetY + y, stripWidth, h, colorA, 'colorA');
        w += stripWidth;

        addRect(group, offsetX + x, offsetY + y + h, w, stripWidth, colorA, 'colorA');
        h += stripWidth;

        addRect(group, offsetX + x - stripWidth, offsetY + y, stripWidth, h, colorB, 'colorB');
        x -= stripWidth;
        w += stripWidth;

        addRect(group, offsetX + x, offsetY + y - stripWidth, w, stripWidth, colorB, 'colorB');
        y -= stripWidth;
        h += stripWidth;
      }
    }

    function drawQuiltBody(group, offsetX, offsetY, blockDrawFn, blocksAcross, blocksDown, sashingWidth, sashingColor, colorA, colorB) {
      const bodyWidth = blocksAcross * blockSize + (blocksAcross + 1) * sashingWidth;
      const bodyHeight = blocksDown * blockSize + (blocksDown + 1) * sashingWidth;

      // sashing background fills the whole body first; block area drawn on top "reclaims" that area
      // for colorA/colorB, so subtract block area from sashing's running total afterward
      addRect(group, offsetX, offsetY, bodyWidth, bodyHeight, sashingColor, 'sashing');

      for (let by = 0; by < blocksDown; by++) {
        for (let bx = 0; bx < blocksAcross; bx++) {
          const blockX = offsetX + sashingWidth + bx * (blockSize + sashingWidth);
          const blockY = offsetY + sashingWidth + by * (blockSize + sashingWidth);
          blockDrawFn(group, blockX, blockY, colorA, colorB);
        }
      }

      // correct sashing total: it was credited for the full body area, but blocks cover blockSize*blockSize each
      const blockCount = blocksAcross * blocksDown;
      areaTotals.sashing -= blockCount * blockSize * blockSize;

      return { bodyWidth, bodyHeight };
    }

    function drawQuilt(blockDrawFn, blocksAcross, blocksDown, sashingWidth, sashingColor, borderWidth, borderColor, colorA, colorB) {
      const bodyWidth = blocksAcross * blockSize + (blocksAcross + 1) * sashingWidth;
      const bodyHeight = blocksDown * blockSize + (blocksDown + 1) * sashingWidth;

      const totalWidth = bodyWidth + borderWidth * 2;
      const totalHeight = bodyHeight + borderWidth * 2;

      svg.setAttribute('width', totalWidth);
      svg.setAttribute('height', totalHeight);
      svg.innerHTML = '';

      // border fills the whole canvas first, then gets "reclaimed" by the body area drawn on top
      addRect(svg, 0, 0, totalWidth, totalHeight, borderColor, 'border');
      drawQuiltBody(svg, borderWidth, borderWidth, blockDrawFn, blocksAcross, blocksDown, sashingWidth, sashingColor, colorA, colorB);
      areaTotals.border -= bodyWidth * bodyHeight;
    }

    function updateYardage(blockSizeInches) {
      const pixelsPerInch = blockSize / blockSizeInches;
      const sqPxPerSqIn = pixelsPerInch * pixelsPerInch;

      const rows = [
        { label: 'Color A', px: areaTotals.colorA, color: colorAInput.value },
        { label: 'Color B', px: areaTotals.colorB, color: colorBInput.value },
        { label: 'Sashing', px: areaTotals.sashing, color: sashingColorInput.value },
        { label: 'Border', px: areaTotals.border, color: borderColorInput.value }
      ];

      let html = '<strong>Estimated Fabric Needed</strong> <span style="font-size:0.85em;color:#666;">(based on 42" usable width, no waste margin)</span>';
      rows.forEach(r => {
        if (r.px <= 0) return; // skip if that element isn't in use (e.g. 0-width sashing)
        const sqIn = r.px / sqPxPerSqIn;
        const yards = sqIn / SQ_IN_PER_YARD;
        html += `<div><span style="display:inline-block;width:14px;height:14px;background:${r.color};border:1px solid #999;vertical-align:middle;margin-right:6px;"></span>${r.label}: ${yards.toFixed(2)} yards</div>`;
      });
      yardageResults.innerHTML = html;
    }

    function redraw() {
      areaTotals = { colorA: 0, colorB: 0, sashing: 0, border: 0 }; // reset before each draw

      const blockDrawFn = patternSelect.value === 'logcabin' ? drawLogCabinBlock : drawNinePatchBlock;
      const blockSizeInches = parseFloat(blockSizeInchesInput.value);
      const blocksAcross = parseInt(blocksAcrossInput.value, 10);
      const blocksDown = parseInt(blocksDownInput.value, 10);
      const sashingWidth = parseInt(sashingWidthInput.value, 10);
      const sashingColor = sashingColorInput.value;
      const borderWidth = parseInt(borderWidthInput.value, 10);
      const borderColor = borderColorInput.value;
      const colorA = colorAInput.value;
      const colorB = colorBInput.value;

      drawQuilt(blockDrawFn, blocksAcross, blocksDown, sashingWidth, sashingColor, borderWidth, borderColor, colorA, colorB);
      updateYardage(blockSizeInches);
    }

    [patternSelect, blockSizeInchesInput, blocksAcrossInput, blocksDownInput, sashingWidthInput, sashingColorInput, borderWidthInput, borderColorInput, colorAInput, colorBInput]
      .forEach(input => input.addEventListener('input', redraw));

    // Converts the current SVG to a PNG and triggers a browser download
    downloadBtn.addEventListener('click', () => {
      const svgWidth = svg.getAttribute('width');
      const svgHeight = svg.getAttribute('height');

      // serialize the live SVG element into a standalone SVG string
      const svgString = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const svgUrl = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = svgWidth;
        canvas.height = svgHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, svgWidth, svgHeight);
        URL.revokeObjectURL(svgUrl);

        canvas.toBlob((pngBlob) => {
          const pngUrl = URL.createObjectURL(pngBlob);
          const link = document.createElement('a');
          link.href = pngUrl;
          link.download = 'quilt-design.png';
          link.click();
          URL.revokeObjectURL(pngUrl);
        }, 'image/png');
      };
      img.src = svgUrl;
    });

    redraw();
  </script>
</body>
</html>
